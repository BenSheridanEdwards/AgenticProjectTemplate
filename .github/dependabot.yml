version: 2
updates:
  # Application + tooling dependencies. Dev deps are grouped into one PR a week
  # so the noise stays low; production deps come through individually.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        dependency-type: development

  # The CI actions themselves — keep them current (and off deprecated runtimes).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
